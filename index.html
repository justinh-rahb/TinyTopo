<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TinyTopo turns any place on Earth into a 3D-printable model — terrain and buildings, exported as STL, entirely in your browser."
    />
    <title>TinyTopo — printable maps</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <h1>TinyTopo</h1>
        <span class="tagline">pick a spot &rarr; print it</span>
        <div id="search">
          <input
            id="search-input"
            type="search"
            placeholder="Search a place… (Enter)"
            autocomplete="off"
          />
          <ul id="search-results" hidden></ul>
        </div>
        <a
          id="github-link"
          href="https://github.com/justinh-rahb/TinyTopo"
          target="_blank"
          rel="noopener"
          aria-label="TinyTopo on GitHub"
          title="TinyTopo on GitHub"
        >
          <svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            />
          </svg>
        </a>
      </header>
      <main id="panes">
        <section id="map-pane">
          <div id="map"></div>
          <div id="map-hint">Draw a rectangle to select an area</div>
        </section>
        <section id="preview-pane">
          <canvas id="preview"></canvas>
          <div id="preview-empty">The generated model will appear here</div>
        </section>
      </main>
      <footer id="controls">
        <label>
          Model width
          <input id="opt-width" type="number" min="20" max="400" step="5" value="120" /> mm
        </label>
        <label>
          Vertical &times;
          <input id="opt-zscale" type="number" min="0.5" max="5" step="0.1" value="1.5" />
        </label>
        <label>
          Base
          <input id="opt-base" type="number" min="1" max="30" step="1" value="4" /> mm
        </label>
        <label class="checkbox">
          <input id="opt-buildings" type="checkbox" checked /> Buildings
        </label>
        <label class="checkbox">
          <input id="opt-roads" type="checkbox" checked /> Roads
        </label>
        <label class="checkbox">
          <input id="opt-water" type="checkbox" checked /> Water
        </label>
        <label class="checkbox">
          <input id="opt-green" type="checkbox" checked /> Green
        </label>
        <button id="btn-generate" disabled>Generate</button>
        <button id="btn-download-3mf" disabled>Download 3MF</button>
        <button id="btn-download" disabled>Download STL</button>
        <span id="status"></span>
        <span id="attribution">
          © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors ·
          Elevation: <a href="https://registry.opendata.aws/terrain-tiles/" target="_blank" rel="noopener">Terrain Tiles</a> (Mapzen/AWS) ·
          Search: <a href="https://nominatim.org/" target="_blank" rel="noopener">Nominatim</a>
          <a
            class="github-icon-link"
            href="https://github.com/justinh-rahb/TinyTopo"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View TinyTopo on GitHub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 2C6.48 2 2 6.61 2 12.3c0 4.54 2.87 8.38 6.84 9.74.5.09.68-.22.68-.49 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.35-3.37-1.35-.46-1.17-1.12-1.48-1.12-1.48-.91-.63.07-.62.07-.62 1.01.07 1.54 1.05 1.54 1.05.9 1.55 2.35 1.1 2.92.84.09-.65.35-1.1.63-1.35-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 2.5-.34c.85 0 1.71.11 2.5.34 1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.31 10.31 0 0 0 22 12.3C22 6.61 17.52 2 12 2Z"
              />
            </svg>
          </a>
        </span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
