<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TinyTopo turns any place on Earth into a 3D-printable model — terrain and buildings, exported as STL, entirely in your browser."
    />
    <title>TinyTopo — printable maps</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <h1>TinyTopo</h1>
        <span class="tagline">pick a spot &rarr; print it</span>
        <div id="search">
          <input
            id="search-input"
            type="search"
            placeholder="Search a place… (Enter)"
            autocomplete="off"
          />
          <ul id="search-results" hidden></ul>
        </div>
      </header>
      <main id="panes">
        <section id="map-pane">
          <div id="map"></div>
          <div id="map-hint">Draw a rectangle to select an area</div>
        </section>
        <section id="preview-pane">
          <canvas id="preview"></canvas>
          <div id="preview-empty">The generated model will appear here</div>
        </section>
      </main>
      <footer id="controls">
        <label>
          Model width
          <input id="opt-width" type="number" min="20" max="400" step="5" value="120" /> mm
        </label>
        <label>
          Vertical &times;
          <input id="opt-zscale" type="number" min="0.5" max="5" step="0.1" value="1.5" />
        </label>
        <label>
          Base
          <input id="opt-base" type="number" min="1" max="30" step="1" value="4" /> mm
        </label>
        <label class="checkbox">
          <input id="opt-buildings" type="checkbox" checked /> Buildings
        </label>
        <button id="btn-generate" disabled>Generate</button>
        <button id="btn-download" disabled>Download STL</button>
        <span id="status"></span>
        <span id="attribution">
          © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors ·
          Elevation: <a href="https://registry.opendata.aws/terrain-tiles/" target="_blank" rel="noopener">Terrain Tiles</a> (Mapzen/AWS) ·
          Search: <a href="https://nominatim.org/" target="_blank" rel="noopener">Nominatim</a>
        </span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
